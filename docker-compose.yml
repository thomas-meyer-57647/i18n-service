services:
  mariadb:
    image: mariadb:10.4.32
    container_name: i18n-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-i18n}
      MARIADB_USER: ${MARIADB_USER:-i18n}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-i18npass}
      TZ: ${APP_TZ:-UTC}
    ports:
      - "${I18N_DB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MARIADB_ROOT_PASSWORD:-rootpass} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  i18n-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: i18n-service
    environment:
      I18N_DB_HOST: mariadb
      I18N_DB_PORT: 3306
      I18N_DB_NAME: ${I18N_DB_NAME:-${MARIADB_DATABASE:-i18n}}
      I18N_DB_USER: ${I18N_DB_USER:-${MARIADB_USER:-i18n}}
      I18N_DB_PASSWORD: ${I18N_DB_PASSWORD:-${MARIADB_PASSWORD:-i18npass}}

      APP_BUNDLE_STORAGE_BASE_PATH: ${APP_BUNDLE_STORAGE_BASE_PATH:-/data/i18n}
      I18NPORT: 8101
      TZ: ${APP_TZ:-UTC}
    ports:
      - "${APP_PORT:-8101}:8101"
    volumes:
      - i18n_data:${APP_BUNDLE_STORAGE_BASE_PATH:-/data/i18n}
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:
  i18n_data:
