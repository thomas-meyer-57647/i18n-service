# App
spring.application.name=i18n-service
server.port=${SERVER_PORT:8080}

# Datasource (MySQL)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:i18n}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA: Schema kommt von Flyway, Hibernate darf nur pruefen
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_i18service
# falls du mal auf eine bestehende DB "drauf" migrierst:
# spring.flyway.baseline-on-migrate=true

spring.devtools.restart.enabled=false

# Swagger / OpenAPI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator (optional, aber sinnvoll)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized