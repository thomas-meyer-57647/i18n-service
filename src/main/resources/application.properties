# App
spring.application.name=i18n-service
server.port=${I18NPORT:8101}

# Datasource (MariaDB)
spring.datasource.url=jdbc:mariadb://${I18N_DB_HOST:localhost}:${I18N_DB_PORT:3306}/${I18N_DB_NAME:i18n}?useUnicode=true&characterEncoding=utf8&useSSL=false&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
spring.datasource.username=${I18N_DB_USER:root}
spring.datasource.password=${I18N_DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA: Schema kommt von Flyway, Hibernate darf nur prüfen
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_i18service
# spring.flyway.baseline-on-migrate=true

spring.devtools.restart.enabled=false

# Swagger / OpenAPI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator (optional, aber sinnvoll)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# Files
app.bundle-storage.base-path=./data/i18n

# Bundle cache (Caffeine)
# Schutz vor unbounded memory: max entries + TTL
app.bundle-cache.maximum-size=2000
app.bundle-cache.ttl-seconds=300

# Runtime endpoint standardmäßig geschützt (JWT i18n:read)
app.runtime.public=false

# Legacy-Fallback (nicht Standard): optionaler zusätzlicher Admin API-Key
app.security.legacy-admin-api-key.enabled=false
app.security.legacy-admin-api-key.value=

# JWT Resource Server (IAM)
# Setze issuer-uri oder jwks-uri (mindestens eines)
security.jwt.issuer-uri=
security.jwt.issuer=
security.jwt.jwks-uri=
security.jwt.audience=i18n-service
security.jwt.clock-skew-seconds=30

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
